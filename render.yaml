services:
  - type: web
    name: litsieve
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_BASE
        value: https://api.deepseek.com/chat/completions
